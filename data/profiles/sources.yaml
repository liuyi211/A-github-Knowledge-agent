github:
  repos:
    - langchain-ai/langgraph
    - microsoft/playwright
    - browser-use/browser-use

  searches:
    # ==========================================
    # AI Agent
    # ==========================================
    - name: AI Agent Framework
      enabled: true
      intent: discover_framework
      query: '"ai agent" framework'
      description: AI Agent 开发框架
      must_terms: [agent, framework]
      nice_terms: [multi-agent, tool-use, autonomous]
      negative_terms: [awesome, tutorial, template, demo, course]
      languages: [Python, TypeScript]
      star_bands: [20..300, 300..5000]
      pushed_after_days: 365
      limit_per_query: 5
      priority: 1.2

    - name: Multi-Agent System
      enabled: true
      intent: discover_framework
      query: '"multi agent" framework'
      description: 多 Agent 协作框架
      must_terms: [agent]
      negative_terms: [awesome, tutorial, demo]
      languages: [Python]
      star_bands: [20..300, 300..5000]
      pushed_after_days: 365
      limit_per_query: 5
      priority: 1.0

    - name: Tool-Use Agent
      enabled: true
      intent: discover_tool
      query: '"tool use" agent'
      description: 工具调用 Agent
      must_terms: [agent]
      nice_terms: [function-calling, tool-calling, mcp]
      negative_terms: [awesome, tutorial]
      languages: [Python]
      star_bands: [20..300, 300..5000]
      pushed_after_days: 365
      limit_per_query: 5
      priority: 1.0

    - name: Agent Workflow
      enabled: true
      intent: discover_trend
      query: '"agent workflow"'
      description: Agent 工作流引擎
      must_terms: [agent, workflow]
      negative_terms: [awesome, tutorial, demo]
      languages: [Python, TypeScript]
      star_bands: [20..300, 300..5000]
      pushed_after_days: 180
      limit_per_query: 5
      priority: 0.9

    # ==========================================
    # Browser Agent
    # ==========================================
    - name: Playwright Agent
      enabled: true
      intent: discover_tool
      query: '"playwright agent"'
      description: 基于 Playwright 的浏览器 Agent
      must_terms: [playwright, agent]
      nice_terms: [browser, automation, llm]
      negative_terms: [awesome, tutorial, template]
      languages: [Python, TypeScript]
      star_bands: [20..300, 300..5000]
      pushed_after_days: 365
      limit_per_query: 5
      priority: 1.2

    - name: Browser Automation Agent
      enabled: true
      intent: discover_tool
      query: '"browser automation" llm agent'
      description: 浏览器自动化 AI Agent
      must_terms: [browser, agent]
      nice_terms: [automation, playwright, selenium]
      negative_terms: [awesome, tutorial]
      languages: [Python, TypeScript]
